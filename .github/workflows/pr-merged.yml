name: PR Merged Automation

on:
  pull_request:
    types: [closed]

jobs:
  welcome-merged-pr:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      pull-requests: write
    steps:
      - name: Comment on merged PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Thank you @${context.payload.pull_request.user.login} for your contribution!\n\nYour pull request has been successfully merged. We appreciate your effort in improving Pollution Control Hub. We look forward to your future contributions!`
            })
